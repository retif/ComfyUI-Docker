name: Build ComfyUI Nix2Container

on:
  push:
    branches: [main]
    paths:
      - 'cu130-megapak-pt210-py314-nix/**'
  pull_request:
    branches: [main]
    paths:
      - 'cu130-megapak-pt210-py314-nix/**'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # Large Nix builds need time
    permissions:
      contents: read
      packages: write

    # Run inside our own nix-ci image — Nix is preconfigured against the
    # Attic mirror at nix-cache-mirror.oleks.space (see /etc/nix/nix.conf
    # baked into the image), so we skip cachix/install-nix-action,
    # cache-nix-action, free-disk-space, and nothing-but-nix.
    container:
      image: git.oleks.space/oleks/nix-ci:latest
      credentials:
        username: ${{ secrets.GITEA_REGISTRY_USERNAME }}
        password: ${{ secrets.GITEA_REGISTRY_TOKEN }}

    steps:
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          git init
          git remote add origin "https://oauth2:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch --depth 1 origin "${{ github.sha }}"
          git checkout FETCH_HEAD

      - name: Configure Gitea credentials
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_REGISTRY_TOKEN }}
        run: |
          echo "machine git.oleks.space login oleks password ${GITEA_TOKEN}" > /root/.netrc
          chmod 600 /root/.netrc

      - name: Show toolchain
        run: |
          echo "Nix:    $(nix --version)"
          echo "Node:   $(node --version)"
          echo "Git:    $(git --version)"

      - name: Show flake outputs
        working-directory: cu130-megapak-pt210-py314-nix
        run: nix flake show --no-write-lock-file

      - name: Evaluate build plan
        working-directory: cu130-megapak-pt210-py314-nix
        run: |
          nix eval .#comfyui.imageName
          nix eval .#comfyui.imageTag

      - name: Build ComfyUI image
        working-directory: cu130-megapak-pt210-py314-nix
        run: |
          echo "Build started at: $(date -u +%FT%TZ)"
          nix build .#comfyui --print-build-logs
          echo "Build completed at: $(date -u +%FT%TZ)"

      - name: Verify build result
        working-directory: cu130-megapak-pt210-py314-nix
        run: |
          ls -lh result
          du -sh result

      - name: Push to GHCR
        working-directory: cu130-megapak-pt210-py314-nix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          # nix2container.copyToRegistry uses skopeo internally and skips
          # unchanged layers automatically (registry-side dedup).
          nix run .#comfyui.copyToRegistry -- \
            --dest-creds "$GITHUB_ACTOR:$GITHUB_TOKEN" \
            ghcr.io/$GITHUB_REPOSITORY_OWNER/comfyui-nix2container:cu130-megapak-py314

      - name: Summary
        working-directory: cu130-megapak-pt210-py314-nix
        run: |
          {
            echo "## Image"
            echo ""
            echo "**Registry:** ghcr.io/${{ github.repository_owner }}/comfyui-nix2container"
            echo "**Tag:** cu130-megapak-py314"
            echo ""
            echo "## Caching"
            echo ""
            echo "- Nix store substituted from \`nix-cache-mirror.oleks.space\` (Attic)"
            echo "- Image runner: \`git.oleks.space/oleks/nix-ci:latest\` (preconfigured)"
            echo "- OCI layers deduplicated at registry — only changed layers re-uploaded"
          } >> $GITHUB_STEP_SUMMARY
